name: european_pay
description: European Pay - Premium fintech application for EU payments, QR transactions, loyalty rewards, and bank account management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.7.0

  # Local Storage
  hive: ^4.0.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  lottie: ^3.3.1
  animations: ^2.0.11
  shimmer: ^3.0.0

  # Scanner
  mobile_scanner: ^6.0.5

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Responsive
  responsive_framework: ^1.5.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  flutter_hooks: ^0.20.5
  equatable: ^2.0.7
  path_provider: ^2.1.5

  # WebView
  webview_flutter: ^4.10.0

  # Clipboard
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/svg/

  fonts:
    - family: EuropeanPay
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
